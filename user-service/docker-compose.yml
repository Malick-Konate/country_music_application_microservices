services:
  user:
    build:
      context: .
      dockerfile: Dockerfile
    hostname: user
    ports:
      - "8081:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://user_postgres/user
      - SPRING_DATASOURCE_USERNAME=user
      - SPRING_DATASOURCE_PASSWORD=pwd
    depends_on:
      user_postgres:
        condition: service_healthy


  user_postgres:
    image: postgres:latest
    container_name: postgres1-user
    hostname: postgres_user
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=user
      - PGUSER=user
      - POSTGRES_PASSWORD=pwd
      - POSTGRES_DB=user
    #    volumes:
    #      - ./data/postgres:/var/lib/postgresql/data
    #      - ./data/init.d:/docker-entrypoint-initdb.d
    healthcheck:
      test: "pg_isready -h user_postgres"
      interval: 10s
      timeout: 5s
      retries: 5




