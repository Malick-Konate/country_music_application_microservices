# Default Spring Profile
server:
  error:
    include-message: always

logging:
  level:
    root: INFO
    com.konate: DEBUG
    org.springframework.boot.test: DEBUG
    de.flapdoodle.embed.mongo: DEBUG
    org.springframework.data.mongodb.core.MongoTemplate: DEBUG


---


# for docker

spring:
    config:
      activate:
        on-profile: docker
    data:
      mongodb:
#        uri: mongodb_podcast://user:pwd@mongodb:27017/podcast
        host: mongodb_podcast
        port: 27017
        username: user
        password: pwd
        authentication-database: admin
        database: podcast
