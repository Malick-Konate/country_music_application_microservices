---
spring:
  config:
    activate:
      on-profile: test

  data:
    mongodb:
      host: localhost
      port: 0 # random port for embedded MongoDB
      database: podcastTestDb
      username: user
      password: pwd
      authentication-database: admin

      auto-index-creation: true
