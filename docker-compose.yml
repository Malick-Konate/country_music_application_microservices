services:
  user:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    hostname: user
#    ports:
#      - "8081:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://user_postgres/user
      - SPRING_DATASOURCE_USERNAME=user
      - SPRING_DATASOURCE_PASSWORD=pwd
    depends_on:
      user_postgres:
        condition: service_healthy

  artist:
    build:
      context: ./artist-service
      dockerfile: Dockerfile
    hostname: artist
#    ports:
#      - "8082:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:mysql://artist_mysql/artist
      - SPRING_DATASOURCE_USERNAME=user
      - SPRING_DATASOURCE_PASSWORD=pwd
    depends_on:
      artist_mysql:
        condition: service_healthy

  podcast:
    build:
      context: ./podcast-service
      dockerfile: Dockerfile
    hostname: podcast
#    ports:
#      - "8083:8080"
#    environment:
#      - SPRING_PROFILES_ACTIVE=docker
#      - SPRING_DATASOURCE_URL=jdbc:mysql://podcast_mysql/podcast
#      - SPRING_DATASOURCE_USERNAME=user
#      - SPRING_DATASOURCE_PASSWORD=pwd
#    depends_on:
#      podcast_mysql:
#        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      #      - SPRING_DATA_MONGODB_URI=mongodb://user:pwd@mongodb_podcast:27017/podcast?authSource=admin
      #      - SPRING_DATA_MONGODB_AUTHENTICATION_DATABASE=admin
      #      - SPRING_DATA_MONGODB_DATABASE=podcast
      #      - SPRING_DATASOURCE_USERNAME=user
      #      - SPRING_DATASOURCE_PASSWORD=pwd
      - SPRING_DATA_MONGODB_HOST=mongodb_podcast
      - SPRING_DATA_MONGODB_PORT=27017
      - SPRING_DATA_MONGODB_USERNAME=user
      - SPRING_DATA_MONGODB_PASSWORD=pwd
      - SPRING_DATA_MONGODB_AUTHENTICATION_DATABASE=admin
      - SPRING_DATA_MONGODB_DATABASE=podcast
    depends_on:
        mongodb_podcast:
          condition: service_healthy


  catalog:
    build:
      context: ./catalog-service
      dockerfile: Dockerfile
    hostname: catalog
#    ports:
#      - "8084:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:mysql://catalog_mysql/catalog
      - SPRING_DATASOURCE_USERNAME=user
      - SPRING_DATASOURCE_PASSWORD=pwd
    depends_on:
      catalog_mysql:
        condition: service_healthy


  order:
    build:
      context: .
      dockerfile: Dockerfile
    hostname: order
    ports:
      - "8087:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://order_postgres/order
      - SPRING_DATASOURCE_USERNAME=user
      - SPRING_DATASOURCE_PASSWORD=pwd
    depends_on:
      order_postgres:
        condition: service_healthy
  ##############################################
  ################## msql#######################

  user_postgres:
    image: postgres:latest
    container_name: postgres1-user
    hostname: postgres_user
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=user
      - PGUSER=user
      - POSTGRES_PASSWORD=pwd
      - POSTGRES_DB=user
    #    volumes:
    #      - ./data/postgres:/var/lib/postgresql/data
    #      - ./data/init.d:/docker-entrypoint-initdb.d
    healthcheck:
      test: "pg_isready -h user_postgres"
      interval: 10s
      timeout: 5s
      retries: 5

  order_postgres:
    image: postgres:latest
    container_name: postgres1-order
    hostname: postgres_order
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=user
      - PGUSER=user
      - POSTGRES_PASSWORD=pwd
      - POSTGRES_DB=order
    #    volumes:
    #      - ./data/postgres:/var/lib/postgresql/data
    #      - ./data/init.d:/docker-entrypoint-initdb.d
    healthcheck:
      test: "pg_isready -h order_postgres"
      interval: 10s
      timeout: 5s
      retries: 5


  #  user_mysql:
#    image: mysql:8
#    ports:
#      - "3307:3306"
#    environment:
#      - MYSQL_ROOT_PASSWORD=rootpass
#      - MYSQL_DATABASE=user
#      - MYSQL_USER=user
#      - MYSQL_PASSWORD=pwd
