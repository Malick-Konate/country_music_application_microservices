  pgadmin1:
    image: dpage/pgadmin4:latest # Or a specific version
    container_name: pgadmin1-user
    restart: always
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@konate.com
      - PGADMIN_DEFAULT_PASSWORD=adminpassword
    ports:
      - 9000:80
    depends_on:
      - user_postgres

  pgadmin2:
    image: dpage/pgadmin4:latest # Or a specific version
    container_name: pgadmin1-order
    restart: always
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@konate.com
      - PGADMIN_DEFAULT_PASSWORD=adminpassword
    ports:
      - 9001:80
    depends_on:
      - order_postgres

  phpmyadmin-artist:
    image: phpmyadmin:5.2.0
    container_name: artist_servicePHPMYADMIN
    links:
      - artist_mysql
    restart: always
    ports:
      - 5014:80
    environment:
      #      - PMA_ARBITRARY=1
      - PMA_HOST=artist_mysql

    depends_on:
      artist_mysql:
        condition: service_healthy


#  phpmyadmin-podcast:
#    image: phpmyadmin:5.2.0
#    container_name: podcast_servicePHPMYADMIN
#    links:
#      - podcast_mysql
#    restart: always
#    ports:
#      - 5015:80
#    environment:
#      #      - PMA_ARBITRARY=1
#      - PMA_HOST=podcast_mysql
#
#    depends_on:
#      podcast_mysql:
#        condition: service_healthy

  mongo-express:
    image: mongo-express
    container_name: mongo_express
    #    hostname: mongo_express
    restart: always

    ports:
      - "8088:8081"
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=user
      - ME_CONFIG_MONGODB_ADMINPASSWORD=pwd
      - ME_CONFIG_MONGODB_SERVER=mongodb_podcast
      - ME_CONFIG_MONGODB_AUTH_DATABASE=admin
    depends_on:
      mongodb_podcast:
        condition: service_healthy


  phpmyadmin-catalog:
    image: phpmyadmin:5.2.0
    container_name: catalog_servicePHPMYADMIN
    links:
      - catalog_mysql
    restart: always
    ports:
      - 5016:80
    environment:
      #      - PMA_ARBITRARY=1
      - PMA_HOST=catalog_mysql

    depends_on:
      catalog_mysql:
        condition: service_healthy




######## API GATEWAY ########
############################


  api-gateway:
    #    image: api-gateway:latest
    hostname: api-gateway
    build: ./api-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - API_GATEWAY_USER_HOST=user
      - API_GATEWAY_ARTIST_HOST=artist
      - API_GATEWAY_PODCAST_HOST=podcast
      - API_GATEWAY_CATALOG_HOST=catalog
      - API_GATEWAY_USER_PORT=8080
      - API_GATEWAY_ARTIST_PORT=8080
      - API_GATEWAY_PODCAST_PORT=8080
      - API_GATEWAY_CATALOG_PORT=8080
      -
    depends_on:
      - user
      - artist
      - podcast
      - catalog
volumes:
  mongodb_data: { }
