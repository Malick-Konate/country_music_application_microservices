#        [
#          "CMD",
#          "mysqladmin",
#          "ping",
#          "-uuser",
#          "-ppwd",
#          "-h",
#          "localhost",
#        ]
#      interval: 10s
#      timeout: 5s
#      retries: 10

  artist_mysql:
    image: mysql:8
    ports:
      - "3308:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootpass
      - MYSQL_DATABASE=artist
      - MYSQL_USER=user
      - MYSQL_PASSWORD=pwd
    volumes:
      - ./data/mysql-artist:/var/lib/artist_mysql
      - ./data/init.d:/docker-entrypoint-initdb.d
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-uuser",
          "-ppwd",
          "-h",
          "localhost",
        ]
      interval: 10s
      timeout: 5s
      retries: 10


  mongodb_podcast:
    image: mongo:8.0
    container_name: mongodb_podcast
    #    hostname: mongodb_podcast
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
#      - ./podcast-service/init-db.js:/docker-entrypoint-initdb.d/init-db.js:ro

    environment:
      - MONGO_INITDB_ROOT_USERNAME=user
      - MONGO_INITDB_ROOT_PASSWORD=pwd
      - MONGO_INITDB_DATABASE=podcast
    #      - ME_CONFIG_MONGODB_ADMINUSERNAME=user
    #      - ME_CONFIG_MONGODB_ADMINPASSWORD=pwd
    #      - ME_CONFIG_MONGODB_SERVER=mongodb_podcast
    #      - ME_CONFIG_MONGODB_AUTH_DATABASE=admin
    #      - ME_CONFIG_MONGODB_DATABASE=podcast
    #      - ME_CONFIG_MONGODB_USER=user
    #      - ME_CONFIG_MONGODB_PASSWORD=pwd
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
#  podcast_mysql:
#    image: mysql:8
#    ports:
#      - "3309:3306"
#    environment:
#      - MYSQL_ROOT_PASSWORD=rootpass
#      - MYSQL_DATABASE=podcast
#      - MYSQL_USER=user
#      - MYSQL_PASSWORD=pwd
#    volumes:
#      - ./data/mysql-podcast:/var/lib/podcast_mysql
#      - ./data/init.d:/docker-entrypoint-initdb.d
#    healthcheck:
#      test:
#        [
#          "CMD",
